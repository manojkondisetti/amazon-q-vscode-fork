# Run AUTHENTICATED Amazon Q E2E tests on a GitHub-hosted Linux runner by performing a REAL
# IdC SSO login — mimicking the actual user "click login" flow. The extension runs its own
# device-code OAuth flow and mints + caches a real, refreshable token itself; the only
# automation is driving the browser approval locally with a headless Playwright script
# (poc-artifacts/scripts/idc-browser-login.py). No auth Lambda, no Secrets Manager, no AWS
# credentials, no static token.
#
# Default spec is the inline-completion suite (test/e2e/inline/inline.test.ts), which logs in
# (via its own before() hook) and exercises automatic/manual inline suggestions. Point test_file
# at another spec to run it instead.
#
# Prereqs:
#   • Repo secrets:   USER_NAME, PASSWORD (the IdC test user the browser driver signs in as).
#   • Repo variables: TEST_SSO_STARTURL, TEST_SSO_REGION (ungate the suite + build the
#     connection / discover region profiles).

name: E2E Auth (Linux, local browser login)

on:
    workflow_dispatch:
        inputs:
            test_file:
                description: 'E2E spec to run (TEST_FILE, relative to packages/amazonq, .ts ok)'
                type: string
                required: true
                # Resolved against packages/amazonq/dist/ with .ts->.js (core/src/test/testRunner.ts),
                # so it must be relative to the package — NOT 'packages/amazonq/test/...'.
                default: 'test/e2e/inline/inline.test.ts'
            vscode_version:
                description: 'VS Code version channel'
                type: choice
                required: true
                default: 'stable'
                options:
                    - stable
                    - minimum
                    - insiders
            reason:
                description: 'Why are you running this?'
                type: string
                required: false
                default: 'Authenticated E2E via real IdC login (local browser)'

permissions:
    contents: read

jobs:
    auth-e2e:
        name: AUTH E2E (${{ inputs.test_file }})
        runs-on: ubuntu-latest
        timeout-minutes: 45
        env:
            VSCODE_TEST_VERSION: ${{ inputs.vscode_version }}
            NODE_OPTIONS: '--max-old-space-size=8192'
            AWS_TOOLKIT_TEST_CACHE_DIR: '/tmp/.vscode-test/'
            AWS_TOOLKIT_TEST_USER_DIR: '/tmp/.vscode-test/user-data/'
            # Scope the run to one spec (e2e/index.ts reads TEST_FILE); all tests in it run.
            TEST_FILE: ${{ inputs.test_file }}
            # Must be != "local" to take the CI auth path (setupUtil.ts, setup.ts).
            AWS_TOOLKIT_AUTOMATION: 'ci'
            # Force the in-process inline-completion path so e2e tests that assert on
            # RecommendationService/session work regardless of the backend A/B flag.
            AMAZONQ_INLINE_ROLLBACK_GROUP: 'treatment'
            # ── Real-login wiring (local browser, no Lambda) ──
            AUTH_UTIL_LOCAL_BROWSER: '1'
            # Absolute path: the hook runs from packages/amazonq (npm -w), so a repo-relative
            # path would resolve under packages/amazonq/ and not be found.
            AUTH_UTIL_LOCAL_BROWSER_SCRIPT: '${{ github.workspace }}/poc-artifacts/scripts/idc-browser-login.py'
            # IdC test-user credentials the browser driver signs in as (GitHub secrets).
            USER_NAME: ${{ secrets.USER_NAME }}
            PASSWORD: ${{ secrets.PASSWORD }}
            # Ungate the suite (isSSOTestEnvironmentAvailable) and build the SSO connection /
            # discover region profiles (connectToEnterpriseSso, listRegionProfile).
            TEST_SSO_STARTURL: ${{ vars.TEST_SSO_STARTURL }}
            TEST_SSO_REGION: ${{ vars.TEST_SSO_REGION }}
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 18
              uses: actions/setup-node@v4
              with:
                  node-version: '18.x'

            - run: npm ci

            # Python + Playwright (Chromium) for the IdC browser-login driver. ubuntu-latest is
            # apt-based, so install-deps works (unlike the Amazon Linux CodeBuild image).
            - name: Set up Python + Playwright (Chromium)
              run: |
                  python3 -m pip install --user playwright
                  python3 -m playwright install --with-deps chromium

            - name: Increase file watchers
              run: echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p

            # Real VS Code under a virtual display. The spec ungates (TEST_SSO_*) and runs
            # loginToIdC() -> connectToEnterpriseSso(), which triggers the extension's device-code
            # flow; registerAuthHook (AUTH_UTIL_LOCAL_BROWSER) stubs openExternal and the Python
            # driver signs in with USER_NAME/PASSWORD. The extension mints + caches its own token.
            - name: AUTH E2E
              uses: coactions/setup-xvfb@v1
              with:
                  run: npm run testE2E -w packages/amazonq

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-auth-report-${{ github.run_id }}
                  path: |
                      .test-reports/
                      packages/amazonq/.test-reports/
                      /tmp/idc-diag/
                  if-no-files-found: warn
                  retention-days: 14
