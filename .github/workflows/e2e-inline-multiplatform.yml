# Multi-platform authenticated inline E2E tests (Linux, macOS, Windows).
# Performs a REAL IdC SSO login via headless Playwright, then runs the stable subset of
# inline-completion tests (manual invoke: accept/reject/discard + unsupported filetype).
#
# Prereqs:
#   • Repo secrets:   USER_NAME, PASSWORD (the IdC test user).
#   • Repo variables: TEST_SSO_STARTURL, TEST_SSO_REGION.

name: E2E Inline (Multi-platform)

on:
    workflow_dispatch:
        inputs:
            platform:
                description: 'Platforms to run on'
                type: choice
                required: true
                default: 'all'
                options:
                    - all
                    - linux
                    - macos
                    - windows
            vscode_version:
                description: 'VS Code version channel'
                type: choice
                required: true
                default: 'stable'
                options:
                    - stable
                    - minimum
                    - insiders
            reason:
                description: 'Why are you running this?'
                type: string
                required: false
                default: 'Pre-release inline E2E validation'

permissions:
    contents: read

jobs:
    matrix:
        name: Resolve platforms
        runs-on: ubuntu-latest
        outputs:
            platforms: ${{ steps.set.outputs.platforms }}
        steps:
            - id: set
              run: |
                  case "${{ inputs.platform }}" in
                    linux)   echo 'platforms=["ubuntu-latest"]' >> "$GITHUB_OUTPUT" ;;
                    macos)   echo 'platforms=["macos-latest"]' >> "$GITHUB_OUTPUT" ;;
                    windows) echo 'platforms=["windows-latest"]' >> "$GITHUB_OUTPUT" ;;
                    *)       echo 'platforms=["ubuntu-latest","macos-latest","windows-latest"]' >> "$GITHUB_OUTPUT" ;;
                  esac

    inline-e2e:
        name: Inline E2E (${{ matrix.os }})
        needs: matrix
        runs-on: ${{ matrix.os }}
        timeout-minutes: 45
        strategy:
            fail-fast: false
            matrix:
                os: ${{ fromJSON(needs.matrix.outputs.platforms) }}
        env:
            VSCODE_TEST_VERSION: ${{ inputs.vscode_version }}
            NODE_OPTIONS: '--max-old-space-size=8192'
            TEST_FILE: 'test/e2e/inline/inline.test.ts'
            # Run only the stable manual-invoke tests (skip flaky automatic-invoke group).
            TEST_GREP: 'manual invoke'
            AWS_TOOLKIT_AUTOMATION: 'ci'
            AMAZONQ_INLINE_ROLLBACK_GROUP: 'treatment'
            AUTH_UTIL_LOCAL_BROWSER: '1'
            AUTH_UTIL_LOCAL_BROWSER_SCRIPT: '${{ github.workspace }}/poc-artifacts/scripts/idc-browser-login.py'
            USER_NAME: ${{ secrets.USER_NAME }}
            PASSWORD: ${{ secrets.PASSWORD }}
            TEST_SSO_STARTURL: ${{ vars.TEST_SSO_STARTURL }}
            TEST_SSO_REGION: ${{ vars.TEST_SSO_REGION }}
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 18
              uses: actions/setup-node@v4
              with:
                  node-version: '18.x'
                  cache: 'npm'

            - name: Install dependencies
              shell: bash
              run: |
                  if [ "$RUNNER_OS" = "Windows" ]; then
                    # Skip native module compilation (registry-js) on Windows — node-gyp
                    # can't find VS on newer runners. The module is optional (credential
                    # storage) and not needed for test execution.
                    npm ci --ignore-scripts
                    npm rebuild --ignore registry-js || true
                  else
                    npm ci
                  fi

            - name: Set up Python + Playwright (Chromium)
              shell: bash
              run: |
                  PY="python3"
                  if [ "$RUNNER_OS" = "Windows" ]; then PY="python"; fi
                  $PY -m pip install --break-system-packages playwright
                  $PY -m playwright install --with-deps chromium

            # Linux-only: raise inotify watchers
            - name: Increase file watchers
              if: runner.os == 'Linux'
              run: echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p

            # Run tests: Linux uses xvfb (virtual display); macOS/Windows run headed.
            - name: Run tests
              uses: coactions/setup-xvfb@v1
              env:
                  AWS_TOOLKIT_TEST_CACHE_DIR: ${{ runner.os == 'Windows' && format('{0}\.vscode-test\', runner.temp) || '/tmp/.vscode-test/' }}
                  AWS_TOOLKIT_TEST_USER_DIR: ${{ runner.os == 'Windows' && format('{0}\.vscode-test\user-data\', runner.temp) || '/tmp/.vscode-test/user-data/' }}
              with:
                  run: npm run testE2E -w packages/amazonq

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-inline-report-${{ matrix.os }}-${{ github.run_id }}
                  path: |
                      .test-reports/
                      packages/amazonq/.test-reports/
                  if-no-files-found: warn
                  retention-days: 14
