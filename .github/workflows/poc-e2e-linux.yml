# POC Phase B (Linux, no-auth, single spec): prove CodeBuild can spin up the PLUGIN in real
# VS Code and run an E2E spec from packages/amazonq — not just the standalone LSP smoke.
#
# Scope choices (deliberate first step):
#   • Single spec via TEST_DIR=test/e2e/lsp  → packages/amazonq/test/e2e/lsp/amazonqLsp.test.ts
#     This spec is AUTH-FREE (no loginToIdC/registerAuthHook) and is built around the
#     __AMAZONQLSP_PATH override. It launches real VS Code + activates the extension.
#   • NOTE: that spec mocks the LSP download (fake targetContents), so it validates the
#     installer/override LOGIC, not a live RC behind the extension. This run proves
#     "CodeBuild runs the real VS Code E2E harness green"; validating the extension AGAINST
#     the RC end-to-end needs a chat/inline spec + the auth Lambda (Phase B-full).
#
# Modeled on the repo's own .github/workflows/node.js.yml `e2e` job (xvfb + env + watchers).
#
# Prereqs: same CodeBuild Linux runner + WORKFLOW_JOB_QUEUED webhook + vars.POC_CODEBUILD_PROJECT.
# No secrets / no IAM changes needed for this no-auth run.

name: POC - LSP E2E (Linux, no-auth)

on:
  workflow_dispatch:
    inputs:
      test_dir:
        description: "E2E spec dir to run (relative to packages/amazonq)"
        type: string
        required: true
        default: "test/e2e/lsp"
      vscode_version:
        description: "VS Code version channel"
        type: choice
        required: true
        default: "stable"
        options:
          - stable
          - minimum
          - insiders
      reason:
        description: "Why are you running this?"
        type: string
        required: false
        default: "POC phase B - plugin E2E"

permissions:
  contents: read

jobs:
  amazonq-e2e:
    name: amazonq E2E (${{ inputs.test_dir }} / ${{ inputs.vscode_version }})
    runs-on:
      - codebuild-${{ vars.POC_CODEBUILD_PROJECT }}-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 45
    env:
      # Mirror the repo's e2e job env exactly.
      VSCODE_TEST_VERSION: ${{ inputs.vscode_version }}
      NODE_OPTIONS: "--max-old-space-size=8192"
      AWS_TOOLKIT_TEST_CACHE_DIR: "/tmp/.vscode-test/"
      AWS_TOOLKIT_TEST_USER_DIR: "/tmp/.vscode-test/user-data/"
      # Scope the e2e run to a single spec dir (e2e/index.ts reads TEST_DIR).
      TEST_DIR: ${{ inputs.test_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - run: npm ci

      # Best-effort: raise the inotify watcher limit. On CodeBuild the runner is in a
      # container where this sysctl is read-only ("permission denied"), so make it
      # non-fatal — it's a perf tweak, not a requirement for the test to run.
      - name: Increase file watchers (best-effort)
        run: |
          echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf || true
          sudo sysctl -p || true

      # Launch real VS Code under a virtual display and run the scoped E2E spec.
      # xvfb is required on Linux for the GUI (Windows would not need this).
      # Hard-fails on test failure — deliberately NOT continue-on-error.
      - name: E2E (xvfb)
        uses: coactions/setup-xvfb@v1
        with:
          run: npm run testE2E -w packages/amazonq

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-e2e-reports-${{ github.run_id }}
          path: .test-reports/
          if-no-files-found: warn
          retention-days: 14
