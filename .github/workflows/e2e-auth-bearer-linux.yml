# Run a single AUTHENTICATED Amazon Q inline E2E test on a GitHub-hosted Linux runner,
# with NO interactive SSO. The IdC bearer token is injected directly via the BEARER_TOKEN
# repository secret (registerStaticBearerToken in packages/core/src/test/setupUtil.ts), which
# stubs SsoAccessTokenProvider.getToken/createToken — the single seam every credential read
# funnels through (incl. the token pushed to the out-of-process Flare LSP). No CodeBuild, no
# Playwright, no Secrets Manager, no AWS credentials.
#
# IMPORTANT — token freshness: inline completions make a REAL backend call, so BEARER_TOKEN
# must be a GENUINE, NON-EXPIRED IdC access token (raw IdC tokens expire in ~1-8h). Dispatch
# this workflow shortly after placing a fresh token in the BEARER_TOKEN secret. A stale token
# fails fast at waitForRecommendations (no suggestions returned).
#
# Prereqs:
#   • Repo secret:    BEARER_TOKEN (a fresh IdC access token with Amazon Q scopes).
#   • Repo variables: TEST_SSO_STARTURL, TEST_SSO_REGION (used to build the SSO connection;
#     only token-minting is stubbed — connectToEnterpriseSso still runs).

name: E2E Auth (Linux, bearer token)

on:
    workflow_dispatch:
        inputs:
            test_file:
                description: 'E2E spec to run (TEST_FILE, relative to packages/amazonq, .ts ok)'
                type: string
                required: true
                # Resolved against packages/amazonq/dist/ with .ts->.js (core/src/test/testRunner.ts),
                # so it must be relative to the package — NOT 'packages/amazonq/test/...'.
                default: 'test/e2e/inline/inline.test.ts'
            test_grep:
                description: 'Mocha grep — scope the run to a single test by title'
                type: string
                required: true
                default: 'manual invoke accept'
            vscode_version:
                description: 'VS Code version channel'
                type: choice
                required: true
                default: 'stable'
                options:
                    - stable
                    - minimum
                    - insiders
            reason:
                description: 'Why are you running this?'
                type: string
                required: false
                default: 'Authenticated inline E2E via injected bearer token'

permissions:
    contents: read

jobs:
    inline-e2e:
        name: inline AUTH E2E (${{ inputs.test_grep }})
        runs-on: ubuntu-latest
        timeout-minutes: 30
        env:
            VSCODE_TEST_VERSION: ${{ inputs.vscode_version }}
            NODE_OPTIONS: '--max-old-space-size=8192'
            AWS_TOOLKIT_TEST_CACHE_DIR: '/tmp/.vscode-test/'
            AWS_TOOLKIT_TEST_USER_DIR: '/tmp/.vscode-test/user-data/'
            # Scope the e2e run to a single spec (e2e/index.ts reads TEST_FILE) and a single test
            # within it (testRunner.ts reads TEST_GREP -> mocha.grep).
            TEST_FILE: ${{ inputs.test_file }}
            TEST_GREP: ${{ inputs.test_grep }}
            # Must be != "local" to take the CI auth path (setupUtil.ts, setup.ts).
            AWS_TOOLKIT_AUTOMATION: 'ci'
            # The injected token. registerStaticBearerToken() reads BEARER_TOKEN and stubs token
            # minting; the spec is gated on this being set (else it falls back to the browser hook).
            BEARER_TOKEN: ${{ secrets.BEARER_TOKEN }}
            # Required to ungate the suite (isSSOTestEnvironmentAvailable) and build the SSO
            # connection (connectToEnterpriseSso). Only token-minting is bypassed.
            TEST_SSO_STARTURL: ${{ vars.TEST_SSO_STARTURL }}
            TEST_SSO_REGION: ${{ vars.TEST_SSO_REGION }}
        steps:
            - uses: actions/checkout@v4

            - name: Use Node.js 18
              uses: actions/setup-node@v4
              with:
                  node-version: '18.x'

            - run: npm ci

            - name: Increase file watchers
              run: echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf && sudo sysctl -p

            # Real VS Code under a virtual display. The spec ungates (TEST_SSO_*), runs loginToIdC()
            # which builds the SSO connection; registerStaticBearerToken injects BEARER_TOKEN so no
            # browser login occurs. TEST_GREP narrows the suite to a single it().
            - name: AUTH E2E
              uses: coactions/setup-xvfb@v1
              with:
                  run: npm run testE2E -w packages/amazonq

            - name: Upload test reports
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: e2e-auth-report-${{ github.run_id }}
                  path: |
                      .test-reports/
                      packages/amazonq/.test-reports/
                  if-no-files-found: warn
                  retention-days: 14
