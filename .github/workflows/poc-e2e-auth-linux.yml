# POC Phase B-auth (Linux): run an AUTHENTICATED amazonq E2E spec on the CodeBuild runner,
# with NO auth Lambda — the SSO device-code browser approval is driven LOCALLY by
# Playwright (poc-artifacts/scripts/idc-browser-login.py), ported from Kiro's IDCLoginBrowser.
#
# Builds directly on the green no-auth poc-e2e-linux.yml (same runner, Xvfb fix #4, watcher
# fix #3). Adds: Python+Playwright, the auth env vars, and the local-browser hook patch.
#
# WHY no Lambda / no lambda:InvokeFunction IAM (vs RUNBOOK §6): pre-seeding ~/.aws/sso/cache
# can't work — the token cache is keyed by a random connection UUID and the connection lives
# in VS Code globalState (SQLite). The extension must run its OWN device-code flow; the hook
# only drives the browser. See scripts-patches/registerAuthHook-local-browser.patch.md.
#
# Prereqs:
#   • Apply scripts-patches/registerAuthHook-local-browser.patch.md to the fork branch first.
#   • Repo Variables: POC_CODEBUILD_PROJECT, TEST_SSO_STARTURL, TEST_SSO_REGION,
#     AMAZONQ_TEST_SECRET (default amazonq-test-account).
#   • CodeBuild service role: secretsmanager:GetSecretValue on the test secret. (No Lambda IAM.)

name: POC - LSP E2E (Linux, AUTH, local browser)

on:
  workflow_dispatch:
    inputs:
      test_file:
        description: "Auth E2E spec to run (TEST_FILE, relative to packages/amazonq, .ts ok)"
        type: string
        required: true
        # Resolved against packages/amazonq/dist/ with .ts→.js (core/src/test/testRunner.ts).
        # So it must be relative to the package — NOT 'packages/amazonq/test/...'.
        default: "test/e2e/amazonq/chat.test.ts"
      vscode_version:
        description: "VS Code version channel"
        type: choice
        required: true
        default: "stable"
        options:
          - stable
          - minimum
          - insiders
      reason:
        description: "Why are you running this?"
        type: string
        required: false
        default: "POC phase B-auth - authenticated E2E, local browser"

permissions:
  contents: read

jobs:
  amazonq-e2e-auth:
    name: amazonq AUTH E2E (${{ inputs.test_file }})
    runs-on:
      - codebuild-${{ vars.POC_CODEBUILD_PROJECT }}-${{ github.run_id }}-${{ github.run_attempt }}
    timeout-minutes: 60
    env:
      VSCODE_TEST_VERSION: ${{ inputs.vscode_version }}
      NODE_OPTIONS: "--max-old-space-size=8192"
      AWS_TOOLKIT_TEST_CACHE_DIR: "/tmp/.vscode-test/"
      AWS_TOOLKIT_TEST_USER_DIR: "/tmp/.vscode-test/user-data/"
      # Scope the e2e run to a single spec (e2e/index.ts reads TEST_FILE).
      TEST_FILE: ${{ inputs.test_file }}
      # ── Auth wiring (local browser, no Lambda) ──
      AUTH_UTIL_LOCAL_BROWSER: "1"
      # Absolute path: the hook runs from packages/amazonq (npm -w), so a repo-relative path
      # would resolve to packages/amazonq/poc-artifacts/... and not be found.
      AUTH_UTIL_LOCAL_BROWSER_SCRIPT: "${{ github.workspace }}/poc-artifacts/scripts/idc-browser-login.py"
      TEST_SSO_STARTURL: ${{ vars.TEST_SSO_STARTURL }}
      TEST_SSO_REGION: ${{ vars.TEST_SSO_REGION }}
      AMAZONQ_TEST_SECRET: ${{ vars.AMAZONQ_TEST_SECRET }}
      AWS_TOOLKIT_AUTOMATION: "ci"   # must be != "local" to take the CI auth path
      # AUTH_UTIL_LAMBDA_ARN intentionally unset — local browser path needs no Lambda.
      # Driver diagnostics → .test-reports/ (uploaded as an artifact, survives a kill).
      IDC_LOG_FILE: "${{ github.workspace }}/packages/amazonq/.test-reports/idc-browser-login.log"
      IDC_DUMP_HTML: "${{ github.workspace }}/packages/amazonq/.test-reports/idc-page"
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"

      - run: npm ci

      # Python + Playwright (Chromium) for the IdC browser-login driver. Amazon Linux image
      # uses dnf/yum (see fix #4); pip + playwright install pulls a self-contained Chromium.
      - name: Set up Python + Playwright (Chromium)
        run: |
          sudo dnf install -y python3-pip || sudo yum install -y python3-pip
          python3 -m pip install --user playwright boto3
          python3 -m playwright install chromium
          # Playwright on Amazon Linux needs a few system libs; install-deps is Debian-only,
          # so pull the common ones via dnf (best-effort — Chromium bundles most).
          sudo dnf install -y nss nspr atk at-spi2-atk cups-libs libdrm libxkbcommon \
            libXcomposite libXdamage libXrandr libgbm pango alsa-lib || true

      # Apply the local-browser hook patch if it hasn't already been committed to the branch.
      # (If you committed the patch, this step is a no-op — guarded by a grep.)
      - name: Ensure local-browser auth hook is present
        run: |
          if ! grep -q "AUTH_UTIL_LOCAL_BROWSER" packages/core/src/test/setupUtil.ts; then
            echo "::error::setupUtil.ts is missing the AUTH_UTIL_LOCAL_BROWSER branch."
            echo "Apply scripts-patches/registerAuthHook-local-browser.patch.md to this branch."
            exit 1
          fi
          echo "Local-browser auth hook present."

      - name: Increase file watchers (best-effort)
        run: |
          echo fs.inotify.max_user_watches=524288 | sudo tee -a /etc/sysctl.conf || true
          sudo sysctl -p || true

      - name: Install Xvfb (Amazon Linux)
        run: sudo dnf install -y xorg-x11-server-Xvfb || sudo yum install -y xorg-x11-server-Xvfb

      # Real VS Code under Xvfb. The auth spec ungates (TEST_SSO_*), runs loginToIdC() which
      # triggers the extension's device-code flow; registerAuthHook stubs openExternal and our
      # Python driver signs in. Hard-fails on test failure — deliberately NOT continue-on-error.
      - name: AUTH E2E (Xvfb :99)
        run: |
          # Ensure the driver's diagnostics dir exists before the hook writes to it.
          mkdir -p packages/amazonq/.test-reports
          Xvfb :99 -screen 0 1920x1080x24 >/tmp/xvfb.log 2>&1 &
          export DISPLAY=:99
          sleep 3
          npm run testE2E -w packages/amazonq

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: poc-e2e-auth-reports-${{ github.run_id }}
          path: |
            .test-reports/
            packages/amazonq/.test-reports/
            /tmp/xvfb.log
          if-no-files-found: warn
          retention-days: 14
